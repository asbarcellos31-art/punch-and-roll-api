<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Punch and Roll — Portal do Aluno</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --black:#0a0a0a;--dark:#111;--panel:#181818;--panel2:#1f1f1f;
  --border:#2a2a2a;--red:#d4111c;--white:#f0f0f0;--muted:#666;--muted2:#444;
  --green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;
}
html,body{height:100%;overflow:hidden;background:var(--black)}
body{font-family:'DM Sans',sans-serif;color:var(--white)}
#app{position:fixed;inset:0;display:flex;flex-direction:column}

/* LOGIN */
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--black)}
.login-logo{width:72px;height:72px;background:var(--panel);border-radius:50%;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:14px;box-shadow:0 0 40px rgba(192,21,31,.2)}
.login-brand{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:340px}
.login-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5}

/* TOPBAR */
.topbar{height:52px;background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.topbar-logo{width:30px;height:30px;background:var(--black);border-radius:50%;border:2px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;flex:1}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:14px;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* BOTTOM NAV */
.bottom-nav{height:56px;background:var(--dark);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;border:none;background:none;font-family:'DM Sans',sans-serif;transition:color .15s}
.bn-item.active{color:var(--red)}
.bn-icon{font-size:20px;line-height:1}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* KPI */
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--green)}.kpi.r::before{background:var(--red)}
.kpi.b::before{background:var(--blue)}.kpi.y::before{background:var(--yellow)}
.kpi-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bg{background:rgba(34,197,94,.15);color:var(--green)}.br{background:rgba(192,21,31,.15);color:#f87171}
.by{background:rgba(245,158,11,.15);color:var(--yellow)}.bb{background:rgba(59,130,246,.15);color:var(--blue)}

/* ALERT */
.alert{padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.alert.r{background:rgba(192,21,31,.12);border:1px solid rgba(192,21,31,.3);color:#f87171}
.alert.y{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--yellow)}
.alert.g{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}

/* FORM */
.fg{margin-bottom:12px}
.fl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.fi{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--red)}

/* BTN */
.btn{padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s}
.btn-r{background:var(--red);color:#fff}
.btn-g{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-full{width:100%;padding:12px;font-size:14px;text-align:center}
.btn-sm{padding:6px 12px;font-size:12px}

/* AULA CARD */
.aula-item{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.aula-hora{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);width:52px;flex-shrink:0}
.aula-info{flex:1;min-width:0}
.aula-nome{font-size:13px;font-weight:500}
.aula-meta{font-size:11px;color:var(--muted);margin-top:2px}

/* DAY TABS */
.day-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:6px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:500;color:var(--muted);background:var(--panel);white-space:nowrap;flex-shrink:0;font-family:'DM Sans',sans-serif;transition:all .15s}
.day-tab.active{background:var(--red);border-color:var(--red);color:#fff}

/* RECADO */
.recado-item{background:var(--panel2);border-radius:10px;padding:14px;margin-bottom:10px}

/* FIN ITEM */
.fin-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e}
.fin-item:last-child{border-bottom:none}

@media(min-width:600px){
  .page{padding:20px}
  .login-screen{padding:40px}
}
</style>
</head>

async function doLogin() {
  const user = (document.getElementById('l-user').value||'').trim().toLowerCase();
  const pass = document.getElementById('l-pass').value;
  if(!user||!pass){document.getElementById('l-erro').style.display='block';return;}
  
  const btnEl = document.querySelector('.btn.btn-r.btn-full');
  if(btnEl){btnEl.textContent='Entrando...';btnEl.disabled=true;}
  
  try {
    const res = await fetch(API_URL+'/api/auth/aluno',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({login:user, senha:pass})
    });
    const data = await res.json();
    if(!res.ok){
      document.getElementById('l-erro').textContent = data.error||'Login ou senha incorretos';
      document.getElementById('l-erro').style.display='block';
      if(btnEl){btnEl.textContent='Entrar';btnEl.disabled=false;}
      return;
    }
    localStorage.setItem('pr_token', data.token);
    usuarioAtual = user;
    alunoAtual = data.aluno;
    await carregarDadosAPI(data.token);
    document.getElementById('login-screen').style.display='none';
    const main = document.getElementById('main-app');
    main.style.display='flex'; main.style.flexDirection='column'; main.style.height='100%';
    document.getElementById('top-avatar').textContent = alunoAtual.nome[0];
    document.getElementById('top-name').textContent = alunoAtual.nome.split(' ')[0];
    navTo('inicio');
  } catch(e){
    document.getElementById('l-erro').textContent = 'Erro de conexão. Tente novamente.';
    document.getElementById('l-erro').style.display='block';
    if(btnEl){btnEl.textContent='Entrar';btnEl.disabled=false;}
  }
}

async function carregarDadosAPI(token) {
  try {
    const h = {'Authorization':'Bearer '+token,'Content-Type':'application/json'};

    // Carregar aulas reais
    const aulasRes = await fetch(API_URL+'/api/aulas').then(r=>r.json());
    if(Array.isArray(aulasRes) && aulasRes.length > 0) {
      AULAS.length = 0;
      aulasRes.forEach(a => AULAS.push(a));
      // Inicializar checkins para cada aula
      AULAS.forEach(a => { if(!CHECKINS[a.id]) CHECKINS[a.id] = []; });
      console.log('✅ Aulas carregadas:', AULAS.length);
    }

    // Carregar recados reais
    const recadosRes = await fetch(API_URL+'/api/recados').then(r=>r.json());
    if(Array.isArray(recadosRes)) {
      RECADOS.length = 0;
      recadosRes.forEach(r => RECADOS.push(r));
      console.log('✅ Recados carregados:', RECADOS.length);
    }

    // Carregar pagamentos do aluno
    const pagRes = await fetch(API_URL+'/api/pagamentos', {headers:h}).then(r=>r.json());
    if(Array.isArray(pagRes)) {
      PAGAMENTOS[alunoAtual.id] = pagRes.map(p=>({
        desc: p.descricao, valor: p.valor,
        data: p.data_pagamento, status: p.status
      }));
    }

    // Carregar checkins do aluno
    const ckRes = await fetch(API_URL+'/api/checkins?aluno_id='+alunoAtual.id, {headers:h}).then(r=>r.json());
    if(Array.isArray(ckRes)) {
      ckRes.forEach(ck => {
        if(!CHECKINS[ck.aula_id]) CHECKINS[ck.aula_id] = [];
        if(!CHECKINS[ck.aula_id].find(c=>c.alunoId===alunoAtual.id)) {
          CHECKINS[ck.aula_id].push({alunoId:alunoAtual.id, nome:alunoAtual.nome, hora:ck.hora});
        }
      });
    }

    console.log('✅ Dados carregados com sucesso!');
  } catch(e) {
    console.error('Erro ao carregar dados da API:', e.message);
  }
}

function logout() {
  if(!confirm('Sair do portal?')) return;
  usuarioAtual = null; alunoAtual = null;
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
  document.getElementById('l-erro').style.display='none';
}

// ══════════════════════════════════════
// NAVEGAÇÃO
// ══════════════════════════════════════
function navTo(pg) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('bn-'+pg).classList.add('active');
  const titles={inicio:'Meu Portal',financeiro:'Situação Financeira',agenda:'Agenda & Check-in',recados:'Recados'};
  document.getElementById('page-title').textContent=titles[pg]||pg;
  if(pg==='inicio') renderInicio();
  if(pg==='financeiro') renderFinanceiro();
  if(pg==='agenda') renderAgenda();
  if(pg==='recados') renderRecados();
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function modLabel(m){return{boxe:'🥊 Boxe',jiujitsu:'🟦 Jiu-Jitsu',ambos:'🥊🟦 Boxe + Jiu-Jitsu'}[m]||m}
function aulaPermitida(au){
  const m=alunoAtual.modalidade;
  if(m==='ambos') return true;
  return au.mod===m;
}

// ══════════════════════════════════════
// INÍCIO
// ══════════════════════════════════════
function renderInicio() {
  const a = alunoAtual;
  const sCls = a.status==='ativo'?'g':a.status==='atrasado'?'r':'y';
  const sTxt = {ativo:'Em dia ✅',atrasado:'Em atraso ❌',vencendo:'Vencendo ⚠️'}[a.status];
  const pinned = RECADOS.filter(r=>r.pin).slice(0,2);
  const aulasHoje = AULAS.filter(au=>au.dia===diaAtual&&aulaPermitida(au));
  const bloqueado = CFG.blockInadim && a.status==='atrasado';
  const nowMin = now.getHours()*60+now.getMinutes();

  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0">${a.nome[0]}</div>
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px">Olá, ${a.nome.split(' ')[0]}!</div>
        <div style="font-size:11px;color:var(--muted)">${modLabel(a.modalidade)}</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="kpi ${sCls}"><div class="kpi-label">Mensalidade</div><div class="kpi-val" style="font-size:16px">${sTxt}</div><div class="kpi-sub">Venc: ${fmtD(a.venc)}</div></div>
      <div class="kpi b"><div class="kpi-label">Plano</div><div class="kpi-val" style="font-size:14px;line-height:1.2">${a.plano.split('—')[0].trim()}</div><div class="kpi-sub">${fmt(a.valor)}/mês</div></div>
    </div>
    ${a.status==='atrasado'?'<div class="alert r">🔴 Mensalidade em atraso. Check-in bloqueado até regularização.</div>':''}
    ${a.status==='vencendo'?'<div class="alert y">⚠️ Sua mensalidade vence em breve. Renove para manter o acesso!</div>':''}
  `;

  // Recados fixados
  if(pinned.length) {
    html += '<div class="card"><div class="card-title">📌 Avisos</div>';
    pinned.forEach(r=>{
      const cor=r.tipo==='urgente'?'var(--red)':r.tipo==='evento'?'var(--blue)':'var(--muted2)';
      html+=`<div style="padding:10px;background:var(--panel2);border-radius:8px;margin-bottom:6px;border-left:3px solid ${cor}">
        <div style="font-size:13px;font-weight:600;margin-bottom:3px">${r.titulo}</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.4">${r.body.slice(0,100)}${r.body.length>100?'...':''}</div>
      </div>`;
    });
    html+=`<button onclick="navTo('recados')" style="width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:6px">Ver todos os recados →</button></div>`;
  }

  // Aulas de hoje
  if(aulasHoje.length) {
    html+='<div class="card"><div class="card-title">📅 Aulas de Hoje — '+diaAtual+'</div>';
    aulasHoje.forEach(au=>{
      const cks=CHECKINS[au.id]||[];
      const ck=cks.find(c=>c.alunoId===a.id);
      const [h,mi]=au.hora.split(':').map(Number);
      const diff=h*60+mi-nowMin;
      const podeCheckin=!bloqueado&&!ck&&diff<=CFG.antecedencia&&diff>=-15&&cks.length<au.vagas;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e1e">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--red);width:44px">${au.hora}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${au.nome}</div><div style="font-size:11px;color:var(--muted)">${cks.length}/${au.vagas} confirmados</div></div>
        ${ck?'<span class="badge bg">✓ OK</span>':
          podeCheckin?`<button onclick="fazerCheckin(${au.id},'inicio')" style="padding:6px 10px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">Check-in</button>`:
          bloqueado?'<span style="font-size:10px;color:#f87171">⛔ Bloq.</span>':
          diff>CFG.antecedencia?'<span style="font-size:10px;color:var(--muted)">Ainda não</span>':
          '<span style="font-size:10px;color:var(--muted)">Encerrado</span>'}
      </div>`;
    });
    html+=`<button onclick="navTo('agenda')" style="width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:8px">Ver agenda completa →</button></div>`;
  }

  document.getElementById('page-inicio').innerHTML = html;
}

// ══════════════════════════════════════
// AGENDA & CHECK-IN
// ══════════════════════════════════════
function renderAgenda() {
  const a = alunoAtual;
  const bloqueado = CFG.blockInadim && a.status==='atrasado';
  const nowMin = now.getHours()*60+now.getMinutes();
  const isHoje = diaSelecionado===diaAtual;

  const tabs = DIAS.map(d=>
    `<button class="day-tab${d===diaSelecionado?' active':''}" onclick="selecionarDia('${d}')">${d}</button>`
  ).join('');

  const aulasD = AULAS.filter(au=>au.dia===diaSelecionado&&aulaPermitida(au))
    .sort((a,b)=>a.hora.localeCompare(b.hora));

  let aulasHTML = '';
  if(aulasD.length===0) {
    aulasHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:32px">Sem aulas neste dia para sua modalidade</div>';
  } else {
    aulasHTML = aulasD.map(au=>{
      const cks=CHECKINS[au.id]||[];
      const ck=cks.find(c=>c.alunoId===a.id);
      const [h,mi]=au.hora.split(':').map(Number);
      const aulaMin=h*60+mi;
      const diff=aulaMin-nowMin;
      const cheio=cks.length>=au.vagas;
      const pct=Math.round(cks.length/au.vagas*100);

      let btn='';
      if(ck) btn=`<button disabled style="padding:7px 12px;background:rgba(34,197,94,.3);color:var(--green);border:1px solid rgba(34,197,94,.5);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px">✓ Confirmado</button>`;
      else if(bloqueado) btn=`<div style="font-size:10px;color:#f87171;text-align:center">⛔ Inadimplente</div>`;
      else if(cheio) btn=`<div style="font-size:10px;color:#f87171;text-align:center">Turma cheia</div>`;
      else if(!isHoje) btn=`<button onclick="fazerCheckin(${au.id},'agenda')" style="padding:7px 12px;background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">Reservar</button>`;
      else if(diff>CFG.antecedencia){const hh=Math.floor(diff/60),mm=diff%60;btn=`<div style="font-size:10px;color:var(--muted);text-align:center">Abre em ${hh>0?hh+'h ':''}${mm}min</div>`;}
      else if(diff<-15) btn=`<div style="font-size:10px;color:var(--muted);text-align:center">Encerrado</div>`;
      else btn=`<button onclick="fazerCheckin(${au.id},'agenda')" style="padding:7px 12px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">✓ Check-in</button>`;

      return `<div class="aula-item">
        <div class="aula-hora">${au.hora}</div>
        <div class="aula-info">
          <div class="aula-nome">${au.nome}</div>
          <div class="aula-meta">${cks.length}/${au.vagas} confirmados${cheio?' · <span style="color:#f87171">Lotado</span>':''}</div>
          <div style="height:3px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden;width:80px">
            <div style="height:100%;width:${pct}%;background:${pct>=90?'var(--red)':pct>=70?'var(--yellow)':'var(--green)'};border-radius:3px"></div>
          </div>
        </div>
        <div style="flex-shrink:0">${btn}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('page-agenda').innerHTML = `
    <div class="day-tabs">${tabs}</div>
    ${bloqueado?'<div class="alert r">🔴 Mensalidade em atraso. Regularize para fazer check-in.</div>':''}
    ${aulasHTML}
  `;
}

function selecionarDia(dia) { diaSelecionado=dia; renderAgenda(); }

async function fazerCheckin(aulaId, origem) {
  const a = alunoAtual;
  const token = localStorage.getItem('pr_token');
  try {
    const res = await fetch(API_URL+'/api/checkins',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({aula_id:aulaId})
    });
    const data = await res.json();
    if(!res.ok){alert(data.error||'Erro ao fazer check-in');return;}
    if(!CHECKINS[aulaId]) CHECKINS[aulaId]=[];
    const hora=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    CHECKINS[aulaId].push({alunoId:a.id,nome:a.nome.split(' ')[0],hora});
    alert('✅ Check-in confirmado! Até lá! 🥊');
    if(origem==='agenda') renderAgenda();
    if(origem==='inicio') renderInicio();
  } catch(e){alert('Erro ao fazer check-in. Tente novamente.');}
}

// ══════════════════════════════════════
// RECADOS
// ══════════════════════════════════════
function renderRecados() {
  const pinned = RECADOS.filter(r=>r.pin);
  const outros = RECADOS.filter(r=>!r.pin);
  const todos = [...pinned,...outros];

  let html = '';
  if(todos.length===0) {
    html='<div style="text-align:center;color:var(--muted);font-size:13px;padding:40px">Nenhum recado no momento</div>';
  } else {
    todos.forEach(r=>{
      const cor=r.tipo==='urgente'?'var(--red)':r.tipo==='evento'?'var(--blue)':'var(--muted2)';
      const tipoBadge=r.tipo==='urgente'?'<span class="badge br">🔴 Urgente</span>':r.tipo==='evento'?'<span class="badge bb">🥊 Evento</span>':'<span class="badge">📢 Info</span>';
      html+=`<div class="recado-item" style="border-left:3px solid ${cor}">
        ${r.pin?'<div style="font-size:9px;color:var(--yellow);font-weight:600;margin-bottom:5px">📌 FIXADO</div>':''}
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div style="font-size:14px;font-weight:600;flex:1;line-height:1.3">${r.titulo}</div>
          <div style="flex-shrink:0;margin-left:8px;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            ${tipoBadge}
            <span style="font-size:10px;color:var(--muted)">${fmtD(r.data)}</span>
          </div>
        </div>
        <div style="font-size:13px;color:var(--muted);line-height:1.6">${r.body}</div>
      </div>`;
    });
  }

  document.getElementById('page-recados').innerHTML = html;
}
</script>

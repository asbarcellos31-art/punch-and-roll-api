<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Punch and Roll — Portal do Aluno</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--dark:#111;--panel:#181818;--panel2:#1f1f1f;--border:#2a2a2a;--red:#d4111c;--white:#f0f0f0;--muted:#666;--green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--white)}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.topbar-logo{width:30px;height:30px;background:var(--bg);border-radius:50%;border:2px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;flex:1}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:14px;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.bottom-nav{height:56px;background:var(--dark);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--muted);font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s}
.bn.active{color:var(--red)}
.bn-icon{font-size:20px;line-height:1}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kg::before{background:var(--green)}.kr::before{background:var(--red)}.kb::before{background:var(--blue)}.ky::before{background:var(--yellow)}
.kpi-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bg{background:rgba(34,197,94,.15);color:var(--green)}.br{background:rgba(212,17,28,.15);color:#f87171}.by{background:rgba(245,158,11,.15);color:var(--yellow)}.bb{background:rgba(59,130,246,.15);color:var(--blue)}
.alert-r{padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;background:rgba(212,17,28,.12);border:1px solid rgba(212,17,28,.3);color:#f87171;line-height:1.4}
.alert-y{padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--yellow);line-height:1.4}
.aula-item{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.aula-hora{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);width:52px;flex-shrink:0}
.aula-info{flex:1}
.aula-nome{font-size:13px;font-weight:500}
.aula-meta{font-size:11px;color:var(--muted);margin-top:2px}
.day-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.day-tab{padding:6px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:500;color:var(--muted);background:var(--panel);white-space:nowrap;flex-shrink:0;font-family:'DM Sans',sans-serif;transition:all .15s}
.day-tab.active{background:var(--red);border-color:var(--red);color:#fff}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:500">
  <a href="/" style="text-decoration:none;display:flex;flex-direction:column;align-items:center" title="Voltar ao início">
    <div style="width:72px;height:72px;background:var(--panel);border-radius:50%;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:14px;box-shadow:0 0 40px rgba(212,17,28,.2)">🥊</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:4px;color:var(--white)">PUNCH AND ROLL</div>
  </a>
  <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px">Portal do Aluno</div>
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:340px">
    <div style="margin-bottom:12px">
      <label style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block">E-mail ou nome</label>
      <input id="l-login" style="width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none" placeholder="seu@email.com ou nome" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block">Senha</label>
      <input id="l-senha" type="password" style="width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button id="l-btn" onclick="doLogin()" style="width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer">ENTRAR</button>
    <div id="l-erro" style="color:#f87171;font-size:12px;text-align:center;margin-top:10px;display:none">Login ou senha incorretos</div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:12px">Senha padrão: <strong style="color:var(--white)">123</strong></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-logo">🥊</div>
    <div class="topbar-title" id="page-title">Início</div>
    <div class="user-chip" onclick="doLogout()">
      <div class="user-avatar" id="top-avatar">?</div>
      <span style="font-size:11px" id="top-name">—</span>
    </div>
  </div>
  <div class="pages">
    <div class="page active" id="page-inicio"></div>
    <div class="page" id="page-financeiro"></div>
    <div class="page" id="page-agenda"></div>
    <div class="page" id="page-recados"></div>
  </div>
  <nav class="bottom-nav">
    <button class="bn active" id="bn-inicio" onclick="navTo('inicio')"><span class="bn-icon">🏠</span>Início</button>
    <button class="bn" id="bn-financeiro" onclick="navTo('financeiro')"><span class="bn-icon">💳</span>Financeiro</button>
    <button class="bn" id="bn-agenda" onclick="navTo('agenda')"><span class="bn-icon">📅</span>Agenda</button>
    <button class="bn" id="bn-recados" onclick="navTo('recados')"><span class="bn-icon">📢</span>Recados</button>
  </nav>
</div>

<script>
const API = 'https://punch-and-roll-api-production.up.railway.app';
const fmtR = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(parseFloat(v)||0);
const fmtD = d => { if(!d||d==='—') return '—'; const[y,m,dd]=String(d).slice(0,10).split('-'); return `${dd}/${m}/${y}`; };
const DIAS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const DIAS_IDX = {1:'Segunda',2:'Terça',3:'Quarta',4:'Quinta',5:'Sexta',6:'Sábado'};
const diaHoje = DIAS_IDX[new Date().getDay()]||'Segunda';
const nowMin = new Date().getHours()*60+new Date().getMinutes();

let _token = localStorage.getItem('pr_aluno_token')||'';
let aluno = null;
let cache = { aulas:[], recados:[], pagamentos:[], checkins:[] };
let diaSelecionado = diaHoje;

async function api(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+_token}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  const data = await r.json();
  if(!r.ok) throw new Error(data.error||'Erro');
  return data;
}

// LOGIN
async function doLogin() {
  const login = document.getElementById('l-login').value.trim();
  const senha = document.getElementById('l-senha').value;
  const btn = document.getElementById('l-btn');
  if(!login||!senha) return;
  btn.innerHTML='<span class="spinner"></span>Entrando...'; btn.disabled=true;
  document.getElementById('l-erro').style.display='none';
  try {
    const data = await api('POST','/api/auth/aluno',{login,senha});
    _token = data.token;
    localStorage.setItem('pr_aluno_token',_token);
    aluno = data.aluno;
    iniciarApp();
  } catch(e) {
    document.getElementById('l-erro').style.display='block';
    btn.textContent='ENTRAR'; btn.disabled=false;
  }
}

function doLogout() {
  if(!confirm('Sair do portal?')) return;
  _token=''; aluno=null; localStorage.removeItem('pr_aluno_token');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-login').value='';
  document.getElementById('l-senha').value='';
}

async function iniciarApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('top-avatar').textContent = aluno.nome[0];
  document.getElementById('top-name').textContent = aluno.nome.split(' ')[0];
  await carregarTudo();
  navTo('inicio');
}

async function carregarTudo() {
  try {
    const [aulas, recados, pags] = await Promise.all([
      api('GET','/api/aulas'),
      api('GET','/api/recados'),
      api('GET','/api/pagamentos'),
    ]);
    cache.aulas = Array.isArray(aulas) ? aulas : [];
    cache.recados = Array.isArray(recados) ? recados : [];
    cache.pagamentos = Array.isArray(pags) ? pags : [];
    // Checkins do aluno
    try {
      const cks = await api('GET','/api/checkins?aluno_id='+aluno.id);
      cache.checkins = Array.isArray(cks) ? cks : [];
    } catch(e) { cache.checkins=[]; }
    // Atualizar dados do aluno
    try {
      const a = await api('GET','/api/alunos/'+aluno.id);
      if(a&&a.id) aluno = {...a, venc:a.vencimento||a.venc||''};
    } catch(e){}
  } catch(e) { console.error('Erro ao carregar:', e.message); }
}

// NAVEGAÇÃO
function navTo(pg) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bn-'+pg).classList.add('active');
  const titles={inicio:'Início',financeiro:'Situação Financeira',agenda:'Agenda & Check-in',recados:'Recados'};
  document.getElementById('page-title').textContent=titles[pg]||pg;
  if(pg==='inicio') renderInicio();
  if(pg==='financeiro') renderFinanceiro();
  if(pg==='agenda') renderAgenda();
  if(pg==='recados') renderRecados();
}

// INÍCIO
function renderInicio() {
  const a = aluno;
  const sCls = a.status==='ativo'?'kg':a.status==='atrasado'?'kr':'ky';
  const sTxt = {ativo:'Em dia ✅',atrasado:'Em atraso ❌',vencendo:'Vencendo ⚠️'}[a.status]||a.status;
  const pinned = cache.recados.filter(r=>r.pin).slice(0,2);
  const aulasHoje = cache.aulas.filter(au=>au.dia===diaHoje&&au.status==='ativo').sort((a,b)=>a.hora.localeCompare(b.hora));
  const bloqueado = a.status==='atrasado';
  const modLabel = {boxe:'🥊 Boxe',jiujitsu:'🟦 Jiu-Jitsu',ambos:'🥊🟦 Ambos'}[a.modalidade]||a.modalidade||'—';

  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0">${a.nome[0]}</div>
      <div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px">Olá, ${a.nome.split(' ')[0]}!</div>
      <div style="font-size:11px;color:var(--muted)">${modLabel}</div></div>
    </div>
    <div class="grid2">
      <div class="kpi ${sCls}"><div class="kpi-label">Mensalidade</div><div class="kpi-val" style="font-size:14px">${sTxt}</div><div class="kpi-sub">Venc: ${fmtD(a.venc)}</div></div>
      <div class="kpi kb"><div class="kpi-label">Plano</div><div class="kpi-val" style="font-size:13px;line-height:1.2">${(a.plano||'—').split('—')[0].trim()}</div><div class="kpi-sub">${fmtR(a.valor)}/mês</div></div>
    </div>
    ${bloqueado?'<div class="alert-r">🔴 Mensalidade em atraso. Check-in bloqueado.</div>':''}
    ${a.status==='vencendo'?'<div class="alert-y">⚠️ Mensalidade vencendo em breve!</div>':''}
  `;

  if(pinned.length) {
    html+='<div class="card"><div class="card-title">📌 Avisos</div>';
    pinned.forEach(r=>{
      const cor=r.tipo==='urgente'?'var(--red)':r.tipo==='evento'?'var(--blue)':'var(--muted2)';
      html+=`<div style="padding:10px;background:var(--panel2);border-radius:8px;margin-bottom:6px;border-left:3px solid ${cor}">
        <div style="font-size:13px;font-weight:600;margin-bottom:3px">${r.titulo}</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.4">${r.body.slice(0,100)}${r.body.length>100?'...':''}</div>
      </div>`;
    });
    html+=`<button onclick="navTo('recados')" style="width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:6px">Ver todos →</button></div>`;
  }

  if(aulasHoje.length) {
    html+='<div class="card"><div class="card-title">📅 Aulas de Hoje — '+diaHoje+'</div>';
    aulasHoje.forEach(au=>{
      const ckFeito = cache.checkins.some(c=>c.aula_id===au.id);
      const [h,mi]=au.hora.split(':').map(Number);
      const diff=(h*60+mi)-nowMin;
      const podeCheckin = !bloqueado&&!ckFeito&&diff<=120&&diff>=-15;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e1e">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--red);width:44px">${au.hora}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${au.nome}</div><div style="font-size:11px;color:var(--muted)">${au.vagas} vagas</div></div>
        ${ckFeito?'<span class="badge bg">✓ OK</span>':
          podeCheckin?`<button onclick="fazerCheckin(${au.id})" style="padding:6px 10px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">Check-in</button>`:
          bloqueado?'<span style="font-size:10px;color:#f87171">⛔ Bloq.</span>':
          diff>120?'<span style="font-size:10px;color:var(--muted)">Ainda não</span>':
          '<span style="font-size:10px;color:var(--muted)">Encerrado</span>'}
      </div>`;
    });
    html+=`<button onclick="navTo('agenda')" style="width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:8px">Ver agenda completa →</button></div>`;
  }

  document.getElementById('page-inicio').innerHTML = html;
}

// FINANCEIRO
function renderFinanceiro() {
  const a = aluno;
  const sCls = a.status==='ativo'?'kg':a.status==='atrasado'?'kr':'ky';
  const sTxt = {ativo:'Em dia ✅',atrasado:'Em atraso ❌',vencendo:'Vencendo ⚠️'}[a.status]||a.status;
  document.getElementById('page-financeiro').innerHTML = `
    <div class="card">
      <div class="card-title">💳 Minha Situação</div>
      <div class="grid2" style="margin-bottom:10px">
        <div class="kpi ${sCls}"><div class="kpi-label">Status</div><div class="kpi-val" style="font-size:13px">${sTxt}</div></div>
        <div class="kpi kb"><div class="kpi-label">Vencimento</div><div class="kpi-val" style="font-size:16px">${fmtD(a.venc)}</div></div>
      </div>
      <div style="background:var(--panel2);border-radius:8px;padding:12px">
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a2a"><span style="font-size:12px;color:var(--muted)">Plano</span><span style="font-size:12px;font-weight:500">${a.plano||'—'}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a2a"><span style="font-size:12px;color:var(--muted)">Valor</span><span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green)">${fmtR(a.valor)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0"><span style="font-size:12px;color:var(--muted)">WhatsApp</span><span style="font-size:12px;font-weight:500">${a.tel||'—'}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📋 Histórico</div>
      ${cache.pagamentos.length===0?'<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px">Nenhum registro</div>':
        cache.pagamentos.map(p=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e">
          <div><div style="font-size:13px;font-weight:500">${p.descricao||'—'}</div><div style="font-size:11px;color:var(--muted)">📅 ${fmtD(p.data_pagamento)}</div></div>
          <div style="text-align:right">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${p.status==='pago'?'var(--green)':'var(--yellow)'}">${fmtR(p.valor)}</div>
            <span class="badge ${p.status==='pago'?'bg':'by'}">${p.status==='pago'?'Pago':'Pendente'}</span>
          </div>
        </div>`).join('')}
    </div>
    <div style="text-align:center;padding:10px">
      <a href="https://wa.me/554898463-9257?text=Olá! Sou ${a.nome} e preciso falar sobre minha mensalidade." target="_blank" 
         style="display:inline-flex;align-items:center;gap:8px;padding:12px 20px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:8px;text-decoration:none;font-size:13px;font-weight:500">
        💬 Falar com a academia
      </a>
    </div>
  `;
}

// AGENDA
function renderAgenda() {
  const a = aluno;
  const bloqueado = a.status==='atrasado';
  const tabs = DIAS.map(d=>`<button class="day-tab${d===diaSelecionado?' active':''}" onclick="selecionarDia('${d}')">${d}</button>`).join('');
  const isHoje = diaSelecionado===diaHoje;
  const aulasD = cache.aulas.filter(au=>au.dia===diaSelecionado&&au.status==='ativo').sort((a,b)=>a.hora.localeCompare(b.hora));

  let html = `<div class="day-tabs">${tabs}</div>`;
  if(bloqueado) html+='<div class="alert-r">🔴 Mensalidade em atraso. Regularize para fazer check-in.</div>';
  if(aulasD.length===0) { html+='<div style="text-align:center;color:var(--muted);font-size:13px;padding:32px">Sem aulas neste dia</div>'; }
  else {
    aulasD.forEach(au=>{
      const ckFeito = cache.checkins.some(c=>c.aula_id===au.id);
      const [h,mi]=au.hora.split(':').map(Number);
      const diff=(h*60+mi)-nowMin;
      let btn='';
      if(ckFeito) btn=`<button disabled style="padding:7px 12px;background:rgba(34,197,94,.3);color:var(--green);border:1px solid rgba(34,197,94,.5);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px">✓ Confirmado</button>`;
      else if(bloqueado) btn=`<span style="font-size:10px;color:#f87171">⛔ Inadimplente</span>`;
      else if(!isHoje) btn=`<button onclick="fazerCheckin(${au.id})" style="padding:7px 12px;background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">Reservar</button>`;
      else if(diff>120){const hh=Math.floor(diff/60),mm=diff%60;btn=`<span style="font-size:10px;color:var(--muted)">Abre em ${hh>0?hh+'h ':''}${mm}min</span>`;}
      else if(diff<-15) btn=`<span style="font-size:10px;color:var(--muted)">Encerrado</span>`;
      else btn=`<button onclick="fazerCheckin(${au.id})" style="padding:7px 12px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">✓ Check-in</button>`;
      html+=`<div class="aula-item">
        <div class="aula-hora">${au.hora}</div>
        <div class="aula-info"><div class="aula-nome">${au.nome}</div><div class="aula-meta">${au.vagas} vagas · ${au.modalidade==='boxe'?'🥊 Boxe':'🟦 Jiu-Jitsu'}</div></div>
        <div style="flex-shrink:0">${btn}</div>
      </div>`;
    });
  }
  document.getElementById('page-agenda').innerHTML = html;
}

function selecionarDia(dia) { diaSelecionado=dia; renderAgenda(); }

async function fazerCheckin(aulaId) {
  try {
    await api('POST','/api/checkins',{aula_id:aulaId});
    // Recarregar checkins
    const cks = await api('GET','/api/checkins?aluno_id='+aluno.id);
    cache.checkins = Array.isArray(cks)?cks:[];
    alert('✅ Check-in confirmado! Até lá! 🥊');
    renderAgenda();
    renderInicio();
  } catch(e) { alert(e.message); }
}

// RECADOS
function renderRecados() {
  const pinned = cache.recados.filter(r=>r.pin);
  const outros = cache.recados.filter(r=>!r.pin);
  const todos = [...pinned,...outros];
  document.getElementById('page-recados').innerHTML = todos.length===0
    ? '<div style="text-align:center;color:var(--muted);font-size:13px;padding:40px">Nenhum recado</div>'
    : todos.map(r=>{
        const cor=r.tipo==='urgente'?'var(--red)':r.tipo==='evento'?'var(--blue)':'var(--muted2)';
        return `<div class="card" style="border-left:3px solid ${cor}">
          ${r.pin?'<div style="font-size:9px;color:var(--yellow);font-weight:600;margin-bottom:5px">📌 FIXADO</div>':''}
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
            <div style="font-size:13px;font-weight:600;flex:1">${r.titulo}</div>
            <span style="font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px">${fmtD(r.criado_em)}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);line-height:1.6">${r.body}</div>
        </div>`;
      }).join('');
}

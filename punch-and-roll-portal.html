<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Punch and Roll — Portal do Aluno</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/logo-icon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#d4111c">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Punch and Roll Fight Team">
<meta property="og:title" content="Portal do Aluno — Punch and Roll">
<meta property="og:description" content="Faça check-in, acompanhe sua frequência e gerencie sua conta.">
<meta property="og:image" content="https://punchandroll.com.br/og-image.png">
<meta property="og:url" content="https://punchandroll.com.br/punch-and-roll-portal.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://punchandroll.com.br/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#ffffff;--dark:#f3f4f6;--panel:#ffffff;--panel2:#f9fafb;--border:#e5e7eb;--red:#d4111c;--white:#111827;--muted:#6b7280;--green:#16a34a;--yellow:#d97706;--blue:#2563eb}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--white)}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.topbar-logo{width:30px;height:30px;background:var(--bg);border-radius:50%;border:2px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;flex:1}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:14px;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.bottom-nav{height:56px;background:var(--dark);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--muted);font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s}
.bn.active{color:var(--red)}
.bn-icon{font-size:20px;line-height:1}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kg::before{background:var(--green)}.kr::before{background:var(--red)}.kb::before{background:var(--blue)}.ky::before{background:var(--yellow)}
.kpi-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bg{background:rgba(34,197,94,.15);color:var(--green)}.br{background:rgba(212,17,28,.15);color:#f87171}.by{background:rgba(245,158,11,.15);color:var(--yellow)}.bb{background:rgba(59,130,246,.15);color:var(--blue)}
.alert-r{padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;background:rgba(212,17,28,.12);border:1px solid rgba(212,17,28,.3);color:#f87171;line-height:1.4}
.alert-y{padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--yellow);line-height:1.4}
.aula-item{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.aula-hora{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);width:52px;flex-shrink:0}
.aula-info{flex:1}
.aula-nome{font-size:13px;font-weight:500}
.aula-meta{font-size:11px;color:var(--muted);margin-top:2px}
.day-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.day-tab{padding:6px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:500;color:var(--muted);background:var(--panel);white-space:nowrap;flex-shrink:0;font-family:'DM Sans',sans-serif;transition:all .15s}
.day-tab.active{background:var(--red);border-color:var(--red);color:#fff}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:500">
  <a href="/" style="text-decoration:none;display:flex;flex-direction:column;align-items:center" title="Voltar ao início">
      <img src="/logo.png" alt="Punch and Roll" style="width:160px;height:auto;margin-bottom:12px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))">
  </a>
  <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px">Portal do Aluno</div>
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:340px">
    <div style="margin-bottom:12px">
      <label style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block">E-mail ou nome</label>
      <input id="l-login" style="width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none" placeholder="seu@email.com ou nome" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block">Senha</label>
      <input id="l-senha" type="password" style="width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button id="l-btn" onclick="doLogin()" style="width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer">ENTRAR</button>
    <div id="l-erro" style="color:#f87171;font-size:12px;text-align:center;margin-top:10px;display:none">Login ou senha incorretos</div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:12px">Senha padrão: <strong style="color:var(--white)">123</strong></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <img src="/logo-icon.png" alt="PR" style="height:52px;width:auto">
    <div class="topbar-title" id="page-title">Início</div>
    <div class="user-chip" onclick="doLogout()">
      <div class="user-avatar" id="top-avatar">?</div>
      <span style="font-size:11px" id="top-name">—</span>
    </div>
  </div>
  <div class="pages">
    <div class="page active" id="page-inicio"></div>
    <div class="page" id="page-financeiro"></div>
    <div class="page" id="page-agenda"></div>
    <div class="page" id="page-recados"></div>
    <div class="page" id="page-shop"></div>
  </div>
  <nav class="bottom-nav">
    <button class="bn active" id="bn-inicio" onclick="navTo('inicio')"><span class="bn-icon">🏠</span>Início</button>
    <button class="bn" id="bn-financeiro" onclick="navTo('financeiro')"><span class="bn-icon">💳</span>Financeiro</button>
    <button class="bn" id="bn-agenda" onclick="navTo('agenda')"><span class="bn-icon">✅</span>Check-in</button>
    <button class="bn" id="bn-recados" onclick="navTo('recados')"><span class="bn-icon">📢</span>Recados</button>
    <button class="bn" id="bn-shop" onclick="navTo('shop')"><span class="bn-icon">🛒</span>Loja</button>
  </nav>
</div>

<script>
const API = 'https://punch-and-roll-api-production.up.railway.app';
const fmtR = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(parseFloat(v)||0);
const fmtD = d => { if(!d||d==='—') return '—'; const[y,m,dd]=String(d).slice(0,10).split('-'); return `${dd}/${m}/${y}`; };
const DIAS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const DIAS_IDX = {1:'Segunda',2:'Terça',3:'Quarta',4:'Quinta',5:'Sexta',6:'Sábado'};
const diaHoje = DIAS_IDX[new Date().getDay()]||'Segunda';
const nowMin = new Date().getHours()*60+new Date().getMinutes();
const hojeUTC = new Date().toISOString().split('T')[0];

let _token = localStorage.getItem('pr_aluno_token')||'';
let aluno = null;
let cache = { aulas:[], recados:[], pagamentos:[], checkins:[], shopProdutos:[], shopPedidos:[] };
let diaSelecionado = diaHoje;
let shopCart = JSON.parse(localStorage.getItem('pr_shop_cart')||'[]');

async function api(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+_token}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  const data = await r.json();
  if(!r.ok) throw new Error(data.error||'Erro');
  return data;
}

// LOGIN
async function doLogin() {
  const login = document.getElementById('l-login').value.trim();
  const senha = document.getElementById('l-senha').value;
  const btn = document.getElementById('l-btn');
  if(!login||!senha) return;
  btn.innerHTML='<span class="spinner"></span>Entrando...'; btn.disabled=true;
  document.getElementById('l-erro').style.display='none';
  try {
    const data = await api('POST','/api/auth/aluno',{login,senha});
    _token = data.token;
    localStorage.setItem('pr_aluno_token',_token);
    aluno = data.aluno;
    iniciarApp();
  } catch(e) {
    document.getElementById('l-erro').style.display='block';
    btn.textContent='ENTRAR'; btn.disabled=false;
  }
}

function doLogout() {
  if(!confirm('Sair do portal?')) return;
  _token=''; aluno=null; localStorage.removeItem('pr_aluno_token');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-login').value='';
  document.getElementById('l-senha').value='';
}

async function iniciarApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('top-avatar').textContent = aluno.nome[0];
  document.getElementById('top-name').textContent = aluno.nome.split(' ')[0];
  await carregarTudo();
  navTo('inicio');
}

async function carregarTudo() {
  try {
    const [aulas, recados, pags, ocup] = await Promise.all([
      api('GET','/api/aulas'),
      api('GET','/api/recados'),
      api('GET','/api/pagamentos'),
      api('GET','/api/aulas/ocupacao'),
    ]);
    cache.aulas = Array.isArray(aulas) ? aulas : [];
    cache.recados = Array.isArray(recados) ? recados : [];
    cache.pagamentos = Array.isArray(pags) ? pags : [];
    cache.ocupacao = (ocup && typeof ocup === 'object') ? ocup : {};
    // Checkins do aluno
    try {
      const cks = await api('GET','/api/checkins?aluno_id='+aluno.id);
      cache.checkins = Array.isArray(cks) ? cks : [];
    } catch(e) { cache.checkins=[]; }
    // Atualizar dados do aluno
    try {
      const a = await api('GET','/api/alunos/'+aluno.id);
      if(a&&a.id) aluno = {...a, venc:a.vencimento||a.venc||''};
    } catch(e){}
  } catch(e) { console.error('Erro ao carregar:', e.message); }
}

// NAVEGAÇÃO
function navTo(pg) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bn-'+pg).classList.add('active');
  const titles={inicio:'Início',financeiro:'Situação Financeira',agenda:'Check-in',recados:'Recados',shop:'🛒 Loja'};
  document.getElementById('page-title').textContent=titles[pg]||pg;
  if(pg==='inicio') renderInicio();
  if(pg==='financeiro') renderFinanceiro();
  if(pg==='agenda') renderAgenda();
  if(pg==='recados') renderRecados();
  if(pg==='shop') renderShopPortal();
}

// INÍCIO
function renderInicio() {
  const a = aluno;
  const sCls = a.status==='ativo'?'kg':a.status==='atrasado'?'kr':'ky';
  const sTxt = {ativo:'Em dia ✅',atrasado:'Em atraso ❌',vencendo:'Vencendo ⚠️'}[a.status]||a.status;
  const pinned = cache.recados.filter(r=>r.pin).slice(0,2);
  const aulasHoje = cache.aulas.filter(au=>au.dia===diaHoje&&au.status==='ativo').sort((a,b)=>a.hora.localeCompare(b.hora));
  const bloqueado = a.status==='atrasado';
  const modLabel = {boxe:'🥊 Boxe',jiujitsu:'🟦 Jiu-Jitsu',ambos:'🥊🟦 Ambos'}[a.modalidade]||a.modalidade||'—';

  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0">${a.nome[0]}</div>
      <div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px">Olá, ${a.nome.split(' ')[0]}!</div>
      <div style="font-size:11px;color:var(--muted)">${modLabel}</div></div>
    </div>
    <div class="grid2">
      <div class="kpi ${sCls}"><div class="kpi-label">Mensalidade</div><div class="kpi-val" style="font-size:14px">${sTxt}</div><div class="kpi-sub">Venc: ${fmtD(a.venc)}</div></div>
      <div class="kpi kb"><div class="kpi-label">Plano</div><div class="kpi-val" style="font-size:13px;line-height:1.2">${(a.plano||'—').split('—')[0].trim()}</div><div class="kpi-sub">${fmtR(a.valor)}/mês</div></div>
    </div>
    ${bloqueado?'<div class="alert-r">🔴 Mensalidade em atraso. Check-in bloqueado.</div>':''}
    ${a.status==='vencendo'?'<div class="alert-y">⚠️ Mensalidade vencendo em breve!</div>':''}
  `;

  if(pinned.length) {
    html+='<div class="card"><div class="card-title">📌 Avisos</div>';
    pinned.forEach(r=>{
      const cor=r.tipo==='urgente'?'var(--red)':r.tipo==='evento'?'var(--blue)':'var(--muted)';
      html+=`<div style="padding:10px;background:var(--panel2);border-radius:8px;margin-bottom:6px;border-left:3px solid ${cor}">
        <div style="font-size:13px;font-weight:600;margin-bottom:3px">${r.titulo}</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.4">${r.body.slice(0,100)}${r.body.length>100?'...':''}</div>
      </div>`;
    });
    html+=`<button onclick="navTo('recados')" style="width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:6px">Ver todos →</button></div>`;
  }

  if(aulasHoje.length) {
    html+='<div class="card"><div class="card-title">📅 Aulas de Hoje — '+diaHoje+'</div>';
    aulasHoje.forEach(au=>{
      const ckFeito = cache.checkins.some(c=>c.aula_id===au.id && String(c.data_checkin).split('T')[0]===hojeUTC);
      const [h,mi]=au.hora.split(':').map(Number);
      const diff=(h*60+mi)-nowMin;
      const podeCheckin = !bloqueado&&!ckFeito&&diff<=120&&diff>=-15;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e1e">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--red);width:44px">${au.hora}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${au.nome}</div><div style="font-size:11px;color:var(--muted)">${Math.max(0, au.vagas - (cache.ocupacao[au.id]||0))} vagas restantes</div></div>
        ${ckFeito?'<span class="badge bg">✓ OK</span>':
          podeCheckin?`<button onclick="fazerCheckin(${au.id})" style="padding:6px 10px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">Check-in</button>`:
          bloqueado?'<span style="font-size:10px;color:#f87171">⛔ Bloq.</span>':
          diff>120?'<span style="font-size:10px;color:var(--muted)">Ainda não</span>':
          '<span style="font-size:10px;color:var(--muted)">Encerrado</span>'}
      </div>`;
    });
    html+=`<button onclick="navTo('agenda')" style="width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:8px">Ver agenda completa →</button></div>`;
  }

  document.getElementById('page-inicio').innerHTML = html;
}

// FINANCEIRO
function renderFinanceiro() {
  const a = aluno;
  const sCls = a.status==='ativo'?'kg':a.status==='atrasado'?'kr':'ky';
  const sTxt = {ativo:'Em dia ✅',atrasado:'Em atraso ❌',vencendo:'Vencendo ⚠️'}[a.status]||a.status;
  document.getElementById('page-financeiro').innerHTML = `
    <div class="card">
      <div class="card-title">💳 Minha Situação</div>
      <div class="grid2" style="margin-bottom:10px">
        <div class="kpi ${sCls}"><div class="kpi-label">Status</div><div class="kpi-val" style="font-size:13px">${sTxt}</div></div>
        <div class="kpi kb"><div class="kpi-label">Vencimento</div><div class="kpi-val" style="font-size:16px">${fmtD(a.venc)}</div></div>
      </div>
      <div style="background:var(--panel2);border-radius:8px;padding:12px">
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a2a"><span style="font-size:12px;color:var(--muted)">Plano</span><span style="font-size:12px;font-weight:500">${a.plano||'—'}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a2a"><span style="font-size:12px;color:var(--muted)">Valor</span><span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green)">${fmtR(a.valor)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0"><span style="font-size:12px;color:var(--muted)">WhatsApp</span><span style="font-size:12px;font-weight:500">${a.tel||'—'}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📋 Histórico</div>
      ${cache.pagamentos.length===0?'<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px">Nenhum registro</div>':
        cache.pagamentos.map(p=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e">
          <div><div style="font-size:13px;font-weight:500">${p.descricao||'—'}</div><div style="font-size:11px;color:var(--muted)">📅 ${fmtD(p.data_pagamento)}</div></div>
          <div style="text-align:right">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${p.status==='pago'?'var(--green)':'var(--yellow)'}">${fmtR(p.valor)}</div>
            <span class="badge ${p.status==='pago'?'bg':'by'}">${p.status==='pago'?'Pago':'Pendente'}</span>
          </div>
        </div>`).join('')}
    </div>
    <div style="text-align:center;padding:10px 0 14px">
      <a href="https://wa.me/5548992259899?text=Olá! Sou ${a.nome} e preciso falar sobre minha mensalidade." target="_blank"
         style="display:inline-flex;align-items:center;gap:8px;padding:12px 20px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:8px;text-decoration:none;font-size:13px;font-weight:500">
        💬 Falar com a academia
      </a>
    </div>
    ${renderAlterarPlano(a)}
  `;
}

// AGENDA
function renderAgenda() {
  const a = aluno;
  const bloqueado = a.status==='atrasado';
  const tabs = DIAS.map(d=>`<button class="day-tab${d===diaSelecionado?' active':''}" onclick="selecionarDia('${d}')">${d}</button>`).join('');
  const isHoje = diaSelecionado===diaHoje;
  const aulasD = cache.aulas.filter(au=>au.dia===diaSelecionado&&au.status==='ativo').sort((a,b)=>a.hora.localeCompare(b.hora));

  let html = `<div class="day-tabs">${tabs}</div>`;
  if(bloqueado) html+='<div class="alert-r">🔴 Mensalidade em atraso. Regularize para fazer check-in.</div>';
  if(aulasD.length===0) { html+='<div style="text-align:center;color:var(--muted);font-size:13px;padding:32px">Sem aulas neste dia</div>'; }
  else {
    aulasD.forEach(au=>{
      const ck = cache.checkins.find(c=>c.aula_id===au.id && String(c.data_checkin).split('T')[0]===hojeUTC);
      const ckFeito = !!ck;
      const [h,mi]=au.hora.split(':').map(Number);
      const diff=(h*60+mi)-nowMin;
      let btn='';
      if(ckFeito) {
        const podeCanc = isHoje;
        btn=`<div style="display:flex;gap:6px;align-items:center">
          <span style="padding:7px 10px;background:rgba(34,197,94,.2);color:var(--green);border:1px solid rgba(34,197,94,.4);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600">✓ Confirmado</span>
          ${podeCanc?`<button onclick="cancelarCheckin(${ck.id})" style="padding:7px 8px;background:rgba(212,17,28,.12);color:#f87171;border:1px solid rgba(212,17,28,.25);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer" title="Cancelar check-in">✕</button>`:''}
        </div>`;
      }
      else if(bloqueado) btn=`<span style="font-size:10px;color:#f87171">⛔ Inadimplente</span>`;
      else if(diff<-15&&isHoje) btn=`<span style="font-size:10px;color:var(--muted)">Encerrado</span>`;
      else btn=`<button onclick="fazerCheckin(${au.id})" style="padding:7px 12px;background:${isHoje?'rgba(34,197,94,.15)':'rgba(59,130,246,.15)'};color:${isHoje?'var(--green)':'var(--blue)'};border:1px solid ${isHoje?'rgba(34,197,94,.3)':'rgba(59,130,246,.3)'};border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">${isHoje?'✓ Check-in':'Reservar'}</button>`;
      html+=`<div class="aula-item">
        <div class="aula-hora">${au.hora}</div>
        <div class="aula-info"><div class="aula-nome">${au.nome}</div><div class="aula-meta">${Math.max(0, au.vagas - (cache.ocupacao[au.id]||0))} vagas restantes · ${au.modalidade==='boxe'?'🥊 Boxe':'🟦 Jiu-Jitsu'}</div></div>
        <div style="flex-shrink:0">${btn}</div>
      </div>`;
    });
  }
  document.getElementById('page-agenda').innerHTML = html;
}

function selecionarDia(dia) { diaSelecionado=dia; renderAgenda(); }

async function fazerCheckin(aulaId) {
  // Só 1 check-in por dia
  const hoje = diaHoje;
  const jaTem = cache.checkins.some(c => {
    const dt = c.data_checkin ? String(c.data_checkin).split('T')[0] : '';
    return dt === new Date().toISOString().split('T')[0];
  });
  if (jaTem) { alert('Você já tem um check-in confirmado hoje. Cancele o atual para reservar outro.'); return; }
  try {
    await api('POST','/api/checkins',{aula_id:aulaId});
    const cks = await api('GET','/api/checkins?aluno_id='+aluno.id);
    cache.checkins = Array.isArray(cks)?cks:[];
    alert('✅ Check-in confirmado! Até lá! 🥊');
    renderAgenda();
    renderInicio();
  } catch(e) { alert(e.message); }
}

async function cancelarCheckin(ckId) {
  if (!confirm('Cancelar seu check-in desta aula?')) return;
  try {
    await api('DELETE','/api/checkins/'+ckId);
    const cks = await api('GET','/api/checkins?aluno_id='+aluno.id);
    cache.checkins = Array.isArray(cks)?cks:[];
    renderAgenda();
    renderInicio();
  } catch(e) { alert(e.message||'Erro ao cancelar.'); }
}

// RECADOS
function renderRecados() {
  const pinned = cache.recados.filter(r=>r.pin);
  const outros = cache.recados.filter(r=>!r.pin);
  const todos = [...pinned,...outros];
  document.getElementById('page-recados').innerHTML = todos.length===0
    ? '<div style="text-align:center;color:var(--muted);font-size:13px;padding:40px">Nenhum recado</div>'
    : todos.map(r=>{
        const cor=r.tipo==='urgente'?'var(--red)':r.tipo==='evento'?'var(--blue)':'var(--muted)';

            <div style="font-size:13px;font-weight:600;flex:1">${r.titulo}</div>
            <span style="font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px">${fmtD(r.criado_em)}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);line-height:1.6">${r.body}</div>

}

// ══ ALTERAR PLANO ══
const PLANOS_PORTAL = {
  boxe:[{id:'mensal_boxe',nome:'Mensal — Boxe',valor:200,meses:1},{id:'semestral_boxe',nome:'Semestral — Boxe',valor:190,meses:6},{id:'anual_boxe',nome:'Anual — Boxe',valor:180,meses:12}],
  jiujitsu:[{id:'mensal_jj',nome:'Mensal — Jiu-Jitsu',valor:200,meses:1},{id:'semestral_jj',nome:'Semestral — Jiu-Jitsu',valor:190,meses:6},{id:'anual_jj',nome:'Anual — Jiu-Jitsu',valor:180,meses:12}],
  ambos:[{id:'mensal_amb',nome:'Mensal — Ambos',valor:350,meses:1},{id:'semestral_amb',nome:'Semestral — Ambos',valor:330,meses:6},{id:'anual_amb',nome:'Anual — Ambos',valor:310,meses:12}],
};

function renderAlterarPlano(a) {
  const planos = PLANOS_PORTAL[a.modalidade] || [];
  if (!planos.length) return '';
  const fmtR = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
  return `<div class="card">
    <div class="card-title">📋 Alterar Plano</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Selecione o novo plano e envie a solicitação. Nossa equipe aplicará a mudança.</div>
    ${planos.map(p => {
      const atual = a.plano_id === p.id || (a.plano||'').includes(p.nome.split('—')[0].trim());
      return `<div style="background:var(--panel2);border:1px solid ${atual?'var(--red)':'var(--border)'};border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${p.nome}</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green)">${fmtR(p.valor)}<span style="font-size:12px;font-weight:400;color:var(--muted)">/mês</span></div>
          <div style="font-size:10px;color:var(--muted)">${p.meses===1?'Renovação mensal':p.meses===6?'Semestral — pagamento antecipado':'Anual — pagamento antecipado'}</div>
        </div>
        ${atual
          ? '<span style="font-size:10px;color:var(--red);font-weight:600;padding:4px 8px;border:1px solid rgba(212,17,28,.4);border-radius:6px;background:rgba(212,17,28,.1)">Plano atual</span>'
          : `<button onclick="solicitarPlano('${p.nome}',${p.valor})" style="padding:7px 12px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">Solicitar →</button>`
        }
      </div>`;
    }).join('')}
  </div>`;
}

async function solicitarPlano(nome, valor) {
  if (!confirm(`Solicitar mudança para "${nome}" (R$ ${valor}/mês)?\n\nA equipe receberá seu pedido e aplicará a mudança.`)) return;
  try {
    await api('POST','/api/alunos/me/solicitar-plano',{plano_nome:nome, plano_valor:valor});
    alert('✅ Solicitação enviada! A equipe entrará em contato em breve. 🥊');
  } catch(e) { alert('Erro: '+e.message); }
}

// ══ SHOP ══
function shopSaveCart() { localStorage.setItem('pr_shop_cart', JSON.stringify(shopCart)); }

function shopCartQtd(prodId) { return (shopCart.find(x=>x.id===prodId)||{qtd:0}).qtd; }

function shopAddCart(prodId) {
  const p = cache.shopProdutos.find(x=>x.id===prodId);
  if (!p) return;
  const item = shopCart.find(x=>x.id===prodId);
  if (item) {
    if (item.qtd >= p.estoque) { alert('Estoque máximo atingido!'); return; }
    item.qtd++;
  } else {
    shopCart.push({ id:prodId, nome:p.nome, preco:parseFloat(p.preco), qtd:1 });
  }
  shopSaveCart();
  renderShopPortal();
}

function shopRemCart(prodId) {
  const item = shopCart.find(x=>x.id===prodId);
  if (!item) return;
  item.qtd--;
  if (item.qtd <= 0) shopCart = shopCart.filter(x=>x.id!==prodId);
  shopSaveCart();
  renderShopPortal();
}

async function renderShopPortal() {
  const el = document.getElementById('page-shop');
  el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px"><div class="spinner"></div>Carregando...</div>';
  try {
    const [prods, peds] = await Promise.all([
      api('GET','/api/shop/produtos'),
      api('GET','/api/shop/pedidos/meus').catch(()=>[]),
    ]);
    cache.shopProdutos = Array.isArray(prods)?prods:[];
    cache.shopPedidos = Array.isArray(peds)?peds:[];
    shopRenderContent();
  } catch(e) { el.innerHTML = `<div class="alert-r">Erro: ${e.message}</div>`; }
}

function shopRenderContent() {
  const el = document.getElementById('page-shop');
  const prods = cache.shopProdutos;
  const cartTotal = shopCart.reduce((s,i)=>s+i.preco*i.qtd,0);
  const cartCount = shopCart.reduce((s,i)=>s+i.qtd,0);
  const fmtP = v => 'R$ '+parseFloat(v).toFixed(2).replace('.',',');

  let html = '';

  // Carrinho fixo no topo se tiver itens
  if (cartCount > 0) {
    html += `<div style="background:rgba(212,17,28,.12);border:1px solid rgba(212,17,28,.3);border-radius:10px;padding:12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:13px;font-weight:600">🛒 ${cartCount} ${cartCount===1?'item':'itens'}</div>
      <div style="font-size:12px;color:var(--muted)">${shopCart.map(i=>`${i.qtd}x ${i.nome}`).join(', ')}</div></div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green)">${fmtP(cartTotal)}</div>
        <button onclick="shopCheckout()" style="padding:5px 12px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:14px;cursor:pointer;margin-top:4px">FINALIZAR</button>
      </div>
    </div>`;
  }

  if (!prods.length) {
    html += '<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">Nenhum produto disponível no momento.</div>';
  } else {
    const cats = [...new Set(prods.map(p=>p.categoria))].sort();
    cats.forEach(cat => {
      html += `<div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red);padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:10px;margin-top:${html?'16px':'0'}">${cat.toUpperCase()}</div>`;
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px">';
      prods.filter(p=>p.categoria===cat).forEach(p => {
        const qtdNoCart = shopCartQtd(p.id);
        html += `
          <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden">
            ${p.imagem_url ? `<img src="${p.imagem_url}" style="width:100%;height:100px;object-fit:cover" onerror="this.style.display='none'">` : `<div style="height:70px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:28px">🛒</div>`}
            <div style="padding:8px">
              <div style="font-size:12px;font-weight:600;line-height:1.3;margin-bottom:2px">${p.nome}</div>
              ${p.descricao?`<div style="font-size:10px;color:var(--muted);margin-bottom:4px;line-height:1.3">${p.descricao.slice(0,60)}</div>`:''}
              <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--green);margin-bottom:6px">${fmtP(p.preco)}</div>
              <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Estoque: ${p.estoque}</div>
              ${p.estoque===0 ? `<div style="font-size:11px;color:#f87171;text-align:center">Esgotado</div>` :
                qtdNoCart > 0 ?
                `<div style="display:flex;align-items:center;justify-content:center;gap:8px">
                  <button onclick="shopRemCart(${p.id})" style="width:28px;height:28px;background:rgba(212,17,28,.15);color:#f87171;border:1px solid rgba(212,17,28,.3);border-radius:6px;cursor:pointer;font-size:16px;line-height:1">−</button>
                  <span style="font-weight:600;font-size:14px">${qtdNoCart}</span>
                  <button onclick="shopAddCart(${p.id})" style="width:28px;height:28px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:6px;cursor:pointer;font-size:16px;line-height:1">+</button>
                </div>` :
                `<button onclick="shopAddCart(${p.id})" style="width:100%;padding:5px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer">+ Adicionar</button>`
              }
            </div>
          </div>`;
      });
      html += '</div>';
    });
  }

  // Meus pedidos
  if (cache.shopPedidos.length) {
    const statusLabel = {novo:'🆕 Novo',confirmado:'✅ Confirmado',pronto:'📦 Pronto p/ retirada',entregue:'🎉 Entregue',cancelado:'❌ Cancelado'};
    const statusCls = {novo:'bb',confirmado:'bg',pronto:'by',entregue:'bg',cancelado:'br'};
    html += '<div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red);padding-bottom:6px;border-bottom:1px solid var(--border);margin:20px 0 10px">MEUS PEDIDOS</div>';
    cache.shopPedidos.forEach(p => {
      html += `<div class="card" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-size:13px;font-weight:600">Pedido #${p.id}</div>
          <div style="font-size:11px;color:var(--muted)">${p.resumo_itens||'—'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${fmtD(String(p.criado_em).slice(0,10))}</div></div>
          <div style="text-align:right">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--green)">R$ ${parseFloat(p.total||0).toFixed(2).replace('.',',')}</div>
            <span class="badge ${statusCls[p.status]||'bb'}">${statusLabel[p.status]||p.status}</span>
          </div>
        </div>
        ${p.obs?`<div style="font-size:11px;color:var(--muted);margin-top:6px">📝 ${p.obs}</div>`:''}
      </div>`;
    });
  }

  el.innerHTML = html;
}

function shopCheckout() {
  if (!shopCart.length) return;
  const cartTotal = shopCart.reduce((s,i)=>s+i.preco*i.qtd,0);
  const fmtP = v => 'R$ '+parseFloat(v).toFixed(2).replace('.',',');

  const box = document.createElement('div');
  box.id = 'modal-shop-checkout';
  box.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:flex-end;justify-content:center';
  box.innerHTML = `
    <div style="background:var(--dark);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto">
      <div style="width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 14px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px">Finalizar Pedido</div>
        <button onclick="document.getElementById('modal-shop-checkout').remove()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>
      </div>
      <div style="background:var(--panel2);border-radius:8px;padding:10px;margin-bottom:14px">
        ${shopCart.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>${i.qtd}x ${i.nome}</span><span>${fmtP(i.preco*i.qtd)}</span></div>`).join('')}
        <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:600">
          <span>Total</span><span style="color:var(--green)">${fmtP(cartTotal)}</span>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block">Observação (opcional)</label>
        <input id="ck-obs" style="width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none" placeholder="Cor, tamanho, recado...">
      </div>
      <button onclick="shopEnviarPedido()" style="width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer">🥊 CONFIRMAR PEDIDO</button>
      <button onclick="document.getElementById('modal-shop-checkout').remove()" style="width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:8px">Cancelar</button>
    </div>`;
  box.addEventListener('click', e => { if(e.target===box) box.remove(); });
  document.body.appendChild(box);
}

async function shopEnviarPedido() {
  const obs = document.getElementById('ck-obs')?.value.trim()||null;
  const itens = shopCart.map(i=>({produto_id:i.id, qtd:i.qtd}));
  try {
    const btn = document.querySelector('#modal-shop-checkout button');
    if(btn){btn.textContent='Enviando...';btn.disabled=true;}
    await api('POST','/api/shop/pedidos',{itens,obs});
    shopCart = [];
    shopSaveCart();
    document.getElementById('modal-shop-checkout')?.remove();
    alert('✅ Pedido realizado! A equipe entrará em contato. 🥊');
    await renderShopPortal();
  } catch(e) {
    alert('Erro: '+e.message);
    const btn = document.querySelector('#modal-shop-checkout button');
    if(btn){btn.textContent='🥊 CONFIRMAR PEDIDO';btn.disabled=false;}
  }
}

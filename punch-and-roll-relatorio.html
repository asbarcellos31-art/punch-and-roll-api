<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punch and Roll — Relatório Executivo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#d4111c;--dark:#f3f4f6;--blue:#1e3a8a;--green:#16a34a;--yellow:#d97706;--white:#111827}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}

/* PRINT */
@media print{
  .no-print{display:none!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#f1f5f9!important}
  .print-break{page-break-before:always;break-before:page}
  @page{size:A4;margin:0}
}

/* CAPA */
.capa{background:linear-gradient(135deg,#0d1117 60%,#1e3a8a 100%);padding:36px;position:relative;overflow:hidden;min-height:200px}
.capa-bg{position:absolute;inset:0;opacity:.08;background:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);background-size:20px 20px}
.capa-content{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
.capa-logo{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.capa-logo-icon{width:56px;height:56px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px}
.capa-brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fff}
.capa-sub{font-size:11px;color:#60a5fa;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.capa-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,6vw,52px);color:#3b82f6;line-height:.95;margin-bottom:8px}
.capa-badge{display:inline-block;background:#2563eb;color:#fff;font-weight:800;font-size:16px;padding:4px 16px;border-radius:4px}
.capa-controls{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.capa-selects{display:flex;gap:8px}
.capa-select{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.capa-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-capa{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;transition:all .2s}
.btn-capa:hover{background:rgba(255,255,255,.2)}
.btn-capa.primary{background:#2563eb;border-color:#2563eb}
.btn-capa.primary:hover{background:#1d4ed8}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}

/* CONTAINER */
.container{max-width:1100px;margin:0 auto;padding:32px 20px}
.section{margin-bottom:40px}
.section-label{font-size:11px;font-weight:700;color:#2563eb;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.section-title{font-size:26px;font-weight:900;color:#1e293b;margin-bottom:4px}
.section-sub{font-size:13px;color:#64748b}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
@media(max-width:700px){.grid4,.grid3{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}

/* KPI CARD */
.kpi-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #e2e8f0;position:relative;overflow:hidden}
.kpi-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi-val{font-size:28px;font-weight:900;color:#1e293b;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:11px;color:#64748b}
.kpi-pct{margin-top:8px}
.kpi-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pill-green{background:#dcfce7;color:#15803d}
.pill-yellow{background:#fef9c3;color:#92400e}
.pill-red{background:#fee2e2;color:#b91c1c}
.kpi-bar{height:4px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:8px}
.kpi-bar-fill{height:100%;border-radius:4px;transition:width .5s}

/* CARD */
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* CHART BARS (CSS only) */
.chart-wrap{display:flex;align-items:flex-end;gap:6px;height:160px;padding:8px 0}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bars{display:flex;gap:2px;align-items:flex-end;height:130px}
.chart-bar{min-height:3px;border-radius:3px 3px 0 0;width:12px;transition:height .5s}
.chart-label{font-size:9px;color:#94a3b8;font-weight:600}

/* COLABORADORES */
.colab-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;position:relative}
.colab-bar{height:4px;width:100%;border-radius:4px 4px 0 0;position:absolute;top:0;left:0}
.colab-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.colab-name{font-size:15px;font-weight:800;color:#1e293b}
.colab-role{font-size:11px;color:#94a3b8;margin-top:2px}
.colab-val{font-size:22px;font-weight:900;margin:10px 0 4px}
.colab-row{display:flex;justify-content:space-between;font-size:12px;color:#64748b;padding:4px 0;border-bottom:1px solid #f1f5f9}
.colab-pct-bar{height:4px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:8px}

/* STATUS */
.status-card{border-radius:12px;padding:18px;color:#fff}
.status-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;font-size:13px}

/* DARK CARD */
.dark-card{background:#1e3a8a;border-radius:14px;padding:20px;color:#fff}
.dark-card-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* TEXTAREA */
.insight-area{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:12px;color:#e0e7ff;font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:100px;outline:none}
.insight-area::placeholder{color:rgba(255,255,255,.4)}
.insight-area-light{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;color:#334155;font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:80px;outline:none}
.insight-area-light::placeholder{color:#94a3b8}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 10px;font-weight:600;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.tbl td{padding:9px 10px;border-bottom:1px solid #f1f5f9}
.tbl tr:hover td{background:#f8fafc}
.tbl tr.total td{font-weight:700;background:#f1f5f9}

/* ALERT */
.alert-r{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:12px;color:#b91c1c;margin-bottom:10px}
.alert-y{background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:10px}
.alert-g{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:10px 14px;font-size:12px;color:#15803d;margin-bottom:10px}

/* FLUXO */
.fluxo-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.fluxo-label{color:#64748b}
.fluxo-val{font-weight:700}

/* PRINT HEADER */
.print-header{display:none;background:#0d1117;padding:6px 14px;color:#60a5fa;font-size:10px;letter-spacing:1px}
@media print{.print-header{display:block}}

/* META BAR */
.meta-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.meta-label{font-size:12px;color:#64748b;width:80px;flex-shrink:0}
.meta-bar-wrap{flex:1;height:6px;background:#e2e8f0;border-radius:6px;overflow:hidden}
.meta-bar-fill{height:100%;border-radius:6px}
.meta-pct{font-size:11px;font-weight:700;width:40px;text-align:right;flex-shrink:0}

/* OBJETIVO CARD */
.obj-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-top:4px solid}
</style>
</head>
<body>

<!-- CAPA -->
<div class="capa">
  <div class="capa-bg"></div>
  <div class="capa-content">
    <div>
      <div class="capa-logo">
        <div class="capa-logo-icon">🥊</div>
        <div>
          <div class="capa-brand">Punch and Roll</div>
          <div class="capa-sub">Fight Team · São José, SC</div>
        </div>
      </div>
      <div style="font-size:11px;color:#60a5fa;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px">Relatório Executivo</div>
      <div class="capa-title" id="capa-title">Maio 2026</div>
      <div class="capa-badge" id="capa-badge">MAI/26</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
        <div style="width:3px;background:#3b82f6;border-radius:3px;height:36px"></div>
        <div>
          <div style="color:#fff;font-weight:600;font-size:13px">Análise de Performance Mensal</div>
          <div style="color:#94a3b8;font-size:11px">Comparativo com metas e período anterior</div>
        </div>
      </div>
    </div>
    <div class="capa-controls no-print">
      <div class="capa-selects">
        <select class="capa-select" id="sel-mes" onchange="atualizar()">
          <option value="1">Janeiro</option><option value="2">Fevereiro</option>
          <option value="3">Março</option><option value="4">Abril</option>
          <option value="5" selected>Maio</option><option value="6">Junho</option>
          <option value="7">Julho</option><option value="8">Agosto</option>
          <option value="9">Setembro</option><option value="10">Outubro</option>
          <option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
        <select class="capa-select" id="sel-ano" onchange="atualizar()">
          <option value="2025">2025</option><option value="2026" selected>2026</option>
          <option value="2027">2027</option>
        </select>
      </div>
      <div class="capa-btns">
        <button class="btn-capa" onclick="window.print()">🖨️ Imprimir</button>
        <button class="btn-capa" onclick="salvarRelatorio()">💾 Salvar</button>
        <button class="btn-capa primary" onclick="voltarAdmin()">← Admin</button>
      </div>
    </div>
  </div>
</div>

<div class="container" id="main-content">

  <!-- LOADING -->
  <div id="loading" style="text-align:center;padding:60px;color:#64748b">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    <div style="font-size:14px">Carregando dados...</div>
  </div>

  <!-- CONTEÚDO (preenchido pelo JS) -->
  <div id="relatorio-content" style="display:none"></div>

</div>

<script>
const API = 'https://punch-and-roll-api-production.up.railway.app';
const _token = localStorage.getItem('pr_admin_token')||'';
const MESES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES_A = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const CORES = ['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444','#ec4899'];
const fmtR = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(parseFloat(v)||0);
const fmtD = d => { if(!d) return '—'; const[y,m,dd]=String(d).slice(0,10).split('-'); return `${dd}/${m}/${y}`; };

let dadosCache = { alunos:[], aulas:[], pagamentos:[], checkins:[] };
let insights = { receita:'', colaboradores:'', acoes:'', proxMes:'', obs:'' };

function pill(pct, label) {
  const cls = pct>=100?'pill-green':pct>=80?'pill-yellow':'pill-red';
  const icon = pct>=100?'✅':pct>=80?'⚠️':'🔴';
  return `<span class="kpi-pill ${cls}">${icon} ${label||pct.toFixed(0)+'% da meta'}</span>`;
}

function barColor(pct) { return pct>=100?'#22c55e':pct>=80?'#f59e0b':'#ef4444'; }

function pillStatus(pct) {
  if(pct>=100) return {bg:'#dcfce7',color:'#15803d',label:'VERDE',icon:'✅'};
  if(pct>=80) return {bg:'#fef9c3',color:'#92400e',label:'AMARELO',icon:'⚠️'};
  return {bg:'#fee2e2',color:'#b91c1c',label:'VERMELHO',icon:'⚠️'};
}

async function api(path) {
  const r = await fetch(API+path, {headers:{'Authorization':'Bearer '+_token}});
  return r.json();
}

async function carregarDados() {
  try {
    const [alunos, aulas, pags] = await Promise.all([
      api('/api/alunos'), api('/api/aulas'), api('/api/pagamentos')
    ]);
    dadosCache.alunos = Array.isArray(alunos)?alunos:[];
    dadosCache.aulas = Array.isArray(aulas)?aulas:[];
    dadosCache.pagamentos = Array.isArray(pags)?pags:[];
  } catch(e) { console.error(e); }
}

function getMesSel() { return parseInt(document.getElementById('sel-mes').value); }
function getAnoSel() { return parseInt(document.getElementById('sel-ano').value); }

function calcMetricas() {
  const mes = getMesSel();
  const ano = getAnoSel();
  const alunos = dadosCache.alunos;
  const pags = dadosCache.pagamentos;

  const ativos = alunos.filter(a=>a.status==='ativo');
  const atrasados = alunos.filter(a=>a.status==='atrasado');
  const vencendo = alunos.filter(a=>a.status==='vencendo');

  // Receita do mês
  const recMes = pags.filter(p=>{
    const d = p.data_pagamento||p.criado_em||'';
    return parseInt(d.slice(5,7))===mes && parseInt(d.slice(0,4))===ano && p.status==='pago';
  }).reduce((s,p)=>s+parseFloat(p.valor||0),0);

  // Receita esperada (alunos ativos)
  const recEsperada = ativos.reduce((s,a)=>s+parseFloat(a.valor||0),0);

  // Metas (baseadas nos dados reais — academia pequena)
  const metaAlunos = 30; // meta de alunos
  const metaReceita = metaAlunos * 220; // R$ 220 médio por aluno
  const metaNovosMes = 3; // novos alunos por mês

  // Novos alunos no mês
  const novosNoMes = alunos.filter(a=>{
    const mat = a.mat||a.criado_em||'';
    return parseInt(mat.slice(5,7))===mes && parseInt(mat.slice(0,4))===ano;
  }).length;

  // Inadimplência
  const inadimTotal = atrasados.reduce((s,a)=>s+parseFloat(a.valor||0),0);

  // Histórico mensal (últimos 6 meses) — simulado com dados reais
  const historico = Array.from({length:6},(_,i)=>{
    const m2 = mes-5+i;
    const m3 = m2<=0?m2+12:m2;
    const ano2 = m2<=0?ano-1:ano;
    const r = pags.filter(p=>{
      const d=p.data_pagamento||p.criado_em||'';
      return parseInt(d.slice(5,7))===m3&&parseInt(d.slice(0,4))===ano2&&p.status==='pago';
    }).reduce((s,p)=>s+parseFloat(p.valor||0),0);
    return {mes:m3,ano:ano2,receita:r,label:MESES_A[m3]};
  });

  // Cancelados no mês (alunos que saíram — sem dados históricos, estimamos 0)
  const cancelados = 0;

  // Aulas por modalidade
  const aulasBoxe = dadosCache.aulas.filter(a=>a.modalidade==='boxe').length;
  const aulasJJ = dadosCache.aulas.filter(a=>a.modalidade==='jiujitsu').length;

  // Taxa de adimplência
  const taxaAdim = alunos.length>0?Math.round(ativos.length/alunos.length*100):0;

  // Próximo mês
  const proxMes = mes===12?1:mes+1;
  const proxAno = mes===12?ano+1:ano;

  return {
    mes, ano, alunos, ativos, atrasados, vencendo,
    recMes, recEsperada, metaReceita, metaAlunos, metaNovosMes,
    novosNoMes, inadimTotal, historico, cancelados,
    aulasBoxe, aulasJJ, taxaAdim, proxMes, proxAno,
    pctReceita: metaReceita>0?Math.round(recMes/metaReceita*100):0,
    pctAlunos: metaAlunos>0?Math.round(ativos.length/metaAlunos*100):0,
    pctNovos: metaNovosMes>0?Math.round(novosNoMes/metaNovosMes*100):0,
    pctAdim: taxaAdim,
  };
}

function renderRelatorio(m) {
  const maxRec = Math.max(...m.historico.map(h=>h.receita),m.metaReceita,1);
  const statusGeral = m.pctReceita>=100&&m.pctAlunos>=100?'BOM':m.pctReceita>=80?'ATENÇÃO':'CRÍTICO';
  const statusCor = statusGeral==='BOM'?'#22c55e':statusGeral==='ATENÇÃO'?'#f59e0b':'#ef4444';
  const sp = pillStatus(m.pctReceita);

  return `
  <!-- PRINT HEADER -->
  <div class="print-header">PUNCH AND ROLL FIGHT TEAM · RELATÓRIO EXECUTIVO ${MESES[m.mes].toUpperCase()} ${m.ano}</div>

  <!-- SLIDE 1: DASHBOARD EXECUTIVO -->
  <div class="section print-break">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
      <div>
        <div class="section-label">Dashboard Executivo</div>
        <div class="section-title">Dashboard Executivo</div>
        <div class="section-sub">Análise de performance ${MESES[m.mes]} ${m.ano} — Punch and Roll Fight Team</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:#fff;padding:8px 16px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <div style="width:10px;height:10px;border-radius:50%;background:${statusCor}"></div>
        <span style="font-size:13px;font-weight:700;color:${statusCor}">Status Geral: ${statusGeral}</span>
      </div>
    </div>

    <!-- KPIs principais -->
    <div class="grid4" style="margin-bottom:20px">
      <div class="kpi-card" style="border-left-color:${pillStatus(m.pctReceita).border||'#e2e8f0'}">
        <div class="kpi-label">Receita do Mês</div>
        <div class="kpi-val">${fmtR(m.recMes)}</div>
        <div class="kpi-sub">Meta: ${fmtR(m.metaReceita)}</div>
        <div class="kpi-pct">${pill(m.pctReceita)}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(m.pctReceita,100)}%;background:${barColor(m.pctReceita)}"></div></div>
      </div>
      <div class="kpi-card" style="border-left-color:${barColor(m.pctAlunos)}">
        <div class="kpi-label">Alunos Ativos</div>
        <div class="kpi-val">${m.ativos.length}</div>
        <div class="kpi-sub">Meta: ${m.metaAlunos} alunos</div>
        <div class="kpi-pct">${pill(m.pctAlunos)}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(m.pctAlunos,100)}%;background:${barColor(m.pctAlunos)}"></div></div>
      </div>
      <div class="kpi-card" style="border-left-color:${barColor(m.pctNovos)}">
        <div class="kpi-label">Novos Alunos/${MESES_A[m.mes]}</div>
        <div class="kpi-val">${m.novosNoMes}</div>
        <div class="kpi-sub">Meta: ${m.metaNovosMes}/mês</div>
        <div class="kpi-pct">${pill(m.pctNovos)}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(m.pctNovos,100)}%;background:${barColor(m.pctNovos)}"></div></div>
      </div>
      <div class="kpi-card" style="border-left-color:${barColor(m.pctAdim)}">
        <div class="kpi-label">Taxa de Adimplência</div>
        <div class="kpi-val">${m.pctAdim}%</div>
        <div class="kpi-sub">${m.atrasados.length} inadimplente(s)</div>
        <div class="kpi-pct">${pill(m.pctAdim,'')}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(m.pctAdim,100)}%;background:${barColor(m.pctAdim)}"></div></div>
      </div>
    </div>

    <!-- Gráfico + Status -->
    <div class="grid2">
      <div class="card">
        <div class="card-title">📈 Evolução de Receita — Últimos 6 meses</div>
        <div class="chart-wrap">
          ${m.historico.map(h=>{
            const hPct = Math.round((h.receita/maxRec)*120);
            const mPct = Math.round((m.metaReceita/maxRec)*120);
            return `<div class="chart-col">
              <div class="chart-bars">

        </div>
      </div>
      <textarea class="insight-area-light" id="ins-prox" placeholder="Defina estratégias e ações para ${MESES[m.proxMes]}..." style="min-height:100px">${insights.proxMes}</textarea>
    </div>
  </div>

  <!-- BOTÕES FINAIS -->
  <div style="display:flex;justify-content:flex-end;gap:10px;padding-bottom:32px" class="no-print">
    <button onclick="window.print()" class="btn-capa" style="padding:10px 20px;background:#fff;color:#1e293b;border:1px solid #e2e8f0;border-radius:10px;font-weight:600">🖨️ Imprimir</button>
    <button onclick="salvarRelatorio()" class="btn-capa primary" style="padding:10px 24px;background:#1e3a8a;color:#fff;border:none;border-radius:10px;font-weight:600">💾 Salvar Relatório</button>
  </div>
  `;
}

function atualizar() {
  const mes = getMesSel();
  const ano = getAnoSel();
  const nomeMes = MESES[mes];
  document.getElementById('capa-title').textContent = `${nomeMes} ${ano}`;
  document.getElementById('capa-badge').textContent = `${MESES_A[mes].toUpperCase()}/${String(ano).slice(2)}`;
  const m = calcMetricas();
  document.getElementById('loading').style.display='none';
  document.getElementById('relatorio-content').style.display='block';
  document.getElementById('relatorio-content').innerHTML = renderRelatorio(m);
}

function salvarRelatorio() {
  insights.receita = document.getElementById('ins-receita')?.value||'';
  insights.colaboradores = document.getElementById('ins-colab')?.value||'';
  insights.acoes = document.getElementById('ins-acoes')?.value||'';
  insights.obs = document.getElementById('ins-obs')?.value||'';
  insights.proxMes = document.getElementById('ins-prox')?.value||'';
  localStorage.setItem('pr_insights_'+getMesSel()+'_'+getAnoSel(), JSON.stringify(insights));
  alert('✅ Relatório salvo!');
}

function voltarAdmin() {
  window.location.href='/punch-and-roll-admin.html';
}

// Carregar insights salvos
function carregarInsights() {
  const saved = localStorage.getItem('pr_insights_'+getMesSel()+'_'+getAnoSel());
  if(saved) try { Object.assign(insights, JSON.parse(saved)); } catch(e){}
}

// INIT
(async function(){
  if(!_token){ window.location.href='/punch-and-roll-admin.html'; return; }
  carregarInsights();
  await carregarDados();
  atualizar();
})();
</script>
</body>
</html>
